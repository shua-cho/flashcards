<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body.theme-dark {
  --bg: #111; --surface: #1c1c1c; --surface2: #252525;
  --border: #2e2e2e; --text: #f0f0f0; --text2: #555;
  --accent: #e2ff5a; --accent-text: #111;
  --shadow: 0 2px 12px rgba(0,0,0,.4);
}
body.theme-light {
  --bg: #f0f0ee; --surface: #fff; --surface2: #e8e8e6;
  --border: #e0e0dc; --text: #1a1a1a; --text2: #aaa;
  --accent: #1a1a1a; --accent-text: #fff;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
}
body.theme-pink {
  --bg: #fceef5; --surface: #fff5f8; --surface2: #fce8f0;
  --border: #f5d0e0; --text: #2a1a20; --text2: #c498aa;
  --accent: #e8407a; --accent-text: #fff;
  --shadow: 0 2px 12px rgba(232,64,122,.1);
}

body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .25s, color .25s; }

/* HEADER */
.hdr { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 16px; height: 54px; display: flex; align-items: center; justify-content: space-between; transition: background .25s, border-color .25s; }
.logo { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.theme-dots { display: flex; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 7px; }
.tdot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, transform .15s; }
.tdot:hover { transform: scale(1.2); }
.tdot.on { border-color: var(--text); }
.tdot.dark  { background: #222; }
.tdot.light { background: #eee; border: 2px solid #ccc; }
.tdot.pink  { background: #e8407a; }

/* BUTTONS */
.btn { border: none; cursor: pointer; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; justify-content: center; }
.btn-a { background: var(--accent); color: var(--accent-text); border-radius: 10px; font-size: 20px; font-weight: 700; width: 46px; height: 46px; }
.btn-a:active { opacity: .75; transform: scale(.93); }
.btn-g { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; font-size: 20px; width: 46px; height: 46px; }
.btn-g:active { opacity: .75; transform: scale(.93); }
.btn-back { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; font-size: 18px; width: 40px; height: 40px; }
.btn-sm { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 7px; font-size: 13px; width: 30px; height: 30px; }
.btn-del { background: transparent; color: #e05; border: 1px solid transparent; border-radius: 7px; font-size: 13px; width: 30px; height: 30px; }
.btn-del:active { background: #fff0f3; }
body.theme-dark .btn-del:active { background: #2a1020; }
.btn-fav { background: transparent; border: none; font-size: 16px; width: 30px; height: 30px; border-radius: 7px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: transform .15s; }
.btn-fav:active { transform: scale(1.3); }
.btn-insert { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 7px; font-size: 13px; width: 30px; height: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .15s; font-family: inherit; }
.btn-insert:active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.btn-save   { flex:1; background: var(--accent); color: var(--accent-text); border-radius: 10px; font-size: 15px; font-weight: 600; padding: 14px; border: none; cursor: pointer; font-family: inherit; }
.btn-cancel { flex:1; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; padding: 14px; cursor: pointer; font-family: inherit; }
.btn-save:active, .btn-cancel:active { transform: scale(.97); opacity: .85; }

/* PAGES */
.page { display: none; padding: 20px 16px; max-width: 700px; margin: 0 auto; }
.page.active { display: block; }

/* ── LIST ── */
.list-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-count { font-size: 12px; color: var(--text2); }
.list-bar-btns { display: flex; gap: 8px; }
.filter-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.ftab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s; }
.ftab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

.clist { display: flex; flex-direction: column; gap: 10px; }
.crow { display: flex; align-items: flex-start; gap: 8px; }
.crow-num { font-size: 11px; color: var(--text2); min-width: 20px; padding-top: 10px; flex-shrink: 0; }
.mini-pair { flex: 1; min-width: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; height: 132px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: border-color .15s; }
.mini-card.front-card { cursor: default; }
.mini-face-tag { position: absolute; top: 6px; left: 8px; font-size: 8px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); opacity: .7; }
.mini-face-tag.b { color: var(--accent); opacity: 1; }
.mini-body { font-size: 12px; line-height: 1.4; text-align: center; word-break: break-word; margin-top: 14px; max-height: 90px; overflow: hidden; }
.mini-img  { max-width: 100%; max-height: 90px; border-radius: 5px; object-fit: contain; display: block; margin-top: 14px; }

.back-card { cursor: pointer; }
.back-card .back-content { display: none; }
.back-card .peek-ico     { display: flex; }
.back-card.revealed .back-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.back-card.revealed .peek-ico     { display: none; }
.peek-ico { font-size: 22px; display: none; align-items: center; justify-content: center; flex: 1; }

.crow-acts { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.empty { text-align: center; padding: 70px 20px; color: var(--text2); }
.empty-ico { font-size: 36px; margin-bottom: 10px; }
.empty p { font-size: 13px; line-height: 1.8; }

/* ── EDIT ── */
.edit-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.edit-ttl { font-size: 17px; font-weight: 600; }
.faces-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.face-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.face-lbl { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
.type-toggle { display: flex; gap: 5px; margin-bottom: 10px; }
.toggle-btn { flex: 1; padding: 7px 4px; font-size: 11px; font-family: inherit; font-weight: 600; border-radius: 7px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all .15s; }
.toggle-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.face-textarea { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 13px; font-family: inherit; resize: none; height: 100px; transition: border-color .15s; line-height: 1.5; }
.face-textarea:focus { outline: none; border-color: var(--accent); }
.img-area { border: 2px dashed var(--border); border-radius: 8px; padding: 16px 10px; text-align: center; cursor: pointer; position: relative; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; transition: border-color .15s; }
.img-area:active { border-color: var(--accent); }
.img-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.img-hint { font-size: 11px; color: var(--text2); }
.img-prev { max-width: 100%; max-height: 110px; border-radius: 6px; object-fit: contain; display: block; }
.img-rm { font-size: 11px; color: #e05; background: none; border: none; cursor: pointer; position: relative; z-index: 1; padding: 2px 6px; }
.edit-acts { display: flex; gap: 8px; }

/* ── STUDY ── */
.study-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.prog-wrap { flex: 1; }
.prog-txt { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.prog-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

.flip-scene { perspective: 1200px; margin-bottom: 14px; cursor: pointer; }
.flip-card { position: relative; width: 100%; height: 320px; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1); }
.flip-card.flipped { transform: rotateY(180deg); }
.flip-face { position: absolute; top: 0; left: 0; width: 100%; height: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px 24px 28px; box-shadow: var(--shadow); }
.flip-back { transform: rotateY(180deg); }
.ftag { position: absolute; top: 16px; left: 18px; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); }
.ftag.b { color: var(--accent); }
.study-fav-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; transition: transform .15s; }
.study-fav-btn:active { transform: scale(1.3); }
.face-text { font-size: 20px; font-weight: 500; text-align: center; line-height: 1.5; word-break: break-word; }
.face-img  { max-width: 100%; max-height: 230px; border-radius: 10px; object-fit: contain; display: block; }
.flip-hint { font-size: 10px; color: var(--text2); text-align: center; margin-bottom: 10px; letter-spacing: .5px; }

.study-nav { display: flex; gap: 8px; }
.snav-btn { flex: 1; padding: 15px; font-size: 15px; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; transition: all .15s; }
.snav-btn.prev { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.snav-btn.next { background: var(--accent); color: var(--accent-text); }
.snav-btn:active { transform: scale(.97); opacity: .85; }
.snav-btn:disabled { opacity: .3; }

.result { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 48px 24px; text-align: center; margin-bottom: 16px; }
.result.show { display: block; }
.result h2 { font-size: 22px; font-weight: 700; margin: 10px 0 5px; }
.result p { color: var(--text2); font-size: 13px; }
.result-acts { display: flex; gap: 8px; margin-top: 18px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body class="theme-dark">

<div class="hdr">
  <div class="logo">📇 Flashcards</div>
  <div class="hdr-right">
    <div class="theme-dots">
      <div class="tdot dark on" data-t="theme-dark"></div>
      <div class="tdot light" data-t="theme-light"></div>
      <div class="tdot pink"  data-t="theme-pink"></div>
    </div>
  </div>
</div>

<!-- LIST -->
<div class="page active" id="pgList">
  <div class="list-bar">
    <span class="card-count" id="cCount">0 cards</span>
    <div class="list-bar-btns">
      <button class="btn btn-g" id="btnStudyAll">▶</button>
      <button class="btn btn-g" id="btnShuffle">🔀</button>
      <button class="btn btn-a" id="btnAdd">＋</button>
    </div>
  </div>
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">All</button>
    <button class="ftab"        onclick="setFilter('fav',this)">⭐</button>
  </div>
  <div class="clist" id="cList"></div>
  <div style="display:flex;justify-content:center;padding:16px 0 4px;">
    <button id="btnAddBottom" style="background:var(--surface2);border:1px dashed var(--border);color:var(--text2);border-radius:12px;padding:12px 40px;font-size:20px;cursor:pointer;font-family:inherit;">＋</button>
  </div>
</div>

<!-- EDIT -->
<div class="page" id="pgEdit">
  <div class="edit-hdr">
    <button class="btn btn-back" id="editBack">←</button>
    <div class="edit-ttl" id="editTtl">New Card</div>
  </div>
  <div class="faces-grid">
    <div class="face-panel">
      <div class="face-lbl">Front</div>
      <div class="type-toggle">
        <button class="toggle-btn active" id="fToggleText" onclick="setFaceType('f','text')">T</button>
        <button class="toggle-btn"        id="fToggleImg"  onclick="setFaceType('f','image')">🖼</button>
      </div>
      <div id="fInput"></div>
    </div>
    <div class="face-panel">
      <div class="face-lbl">Back</div>
      <div class="type-toggle">
        <button class="toggle-btn active" id="bToggleText" onclick="setFaceType('b','text')">T</button>
        <button class="toggle-btn"        id="bToggleImg"  onclick="setFaceType('b','image')">🖼</button>
      </div>
      <div id="bInput"></div>
    </div>
  </div>
  <div class="edit-acts">
    <button class="btn-cancel" id="cancelEdit">Cancel</button>
    <button class="btn-save"   id="saveCard">Save ✓</button>
  </div>
</div>

<!-- STUDY -->
<div class="page" id="pgStudy">
  <div id="studyInner"></div>
</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let cards     = [];   // runtime array; images stored as object URLs
let rawCards  = [];   // parallel array; images stored as blobKeys (for DB)
let editId    = null, insertAt = null;
let fType     = 'text', bType = 'text';
let fImgData  = '', bImgData = '';   // base64 during edit session only
let fBlobKey  = '', bBlobKey = '';   // existing blobKey when editing image card
let deck      = [], di = 0;
let curFilter = 'all';
let db        = null;

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ══════════════════════════════════════════
// IndexedDB
// ══════════════════════════════════════════
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('fc_db', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('cards'))  d.createObjectStore('cards',  { keyPath: 'id' });
      if (!d.objectStoreNames.contains('images')) d.createObjectStore('images', { keyPath: 'key' });
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}

const tx  = (store, mode) => db.transaction(store, mode).objectStore(store);
const dbPut    = (store, val)  => new Promise((res,rej) => { const r=tx(store,'readwrite').put(val);    r.onsuccess=()=>res(); r.onerror=e=>rej(e); });
const dbGet    = (store, key)  => new Promise((res,rej) => { const r=tx(store,'readonly').get(key);    r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e); });
const dbDel    = (store, key)  => new Promise((res,rej) => { const r=tx(store,'readwrite').delete(key); r.onsuccess=()=>res(); r.onerror=e=>rej(e); });
const dbGetAll = (store)       => new Promise((res,rej) => { const r=tx(store,'readonly').getAll();    r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e); });
const dbClear  = (store)       => new Promise((res,rej) => { const r=tx(store,'readwrite').clear();    r.onsuccess=()=>res(); r.onerror=e=>rej(e); });

function dataURLtoBlob(dataURL) {
  const [h, d] = dataURL.split(',');
  const mime = h.match(/:(.*?);/)[1];
  const bin  = atob(d);
  const arr  = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// Load all cards from DB; resolve image blobs → object URLs
async function loadAllCards() {
  const rows = await dbGetAll('cards');
  rows.sort((a,b) => a.id - b.id);
  rawCards = rows.map(r => ({ front: r.front, back: r.back, fav: r.fav||false }));
  cards = [];
  for (const r of rows) {
    cards.push({
      front: await resolveFace(r.front),
      back:  await resolveFace(r.back),
      fav:   r.fav || false
    });
  }
}

async function resolveFace(face) {
  if (face.type === 'text') return { type:'text', value: face.value };
  if (!face.blobKey) return { type:'image', value:'' };
  const rec = await dbGet('images', face.blobKey);
  if (!rec) return { type:'image', value:'' };
  return { type:'image', value: URL.createObjectURL(rec.blob), blobKey: face.blobKey };
}

// Persist entire cards array to DB
async function persistCards() {
  await dbClear('cards');
  for (let i=0; i<rawCards.length; i++) {
    await dbPut('cards', { id:i, ...rawCards[i] });
  }
}

// ══════════════════════════════════════════
// THEME
// ══════════════════════════════════════════
const savedTheme = localStorage.getItem('fc_theme') || 'theme-dark';
document.body.className = savedTheme;
document.querySelectorAll('.tdot').forEach(d => {
  d.classList.toggle('on', d.dataset.t === savedTheme);
  d.addEventListener('click', () => {
    document.body.className = d.dataset.t;
    localStorage.setItem('fc_theme', d.dataset.t);
    document.querySelectorAll('.tdot').forEach(x => x.classList.remove('on'));
    d.classList.add('on');
  });
});

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
const showPg = id => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};
document.getElementById('editBack').onclick   = () => { showPg('pgList'); renderList(); };
document.getElementById('cancelEdit').onclick = () => { showPg('pgList'); renderList(); };

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function filteredList() {
  const all = cards.map((c,i) => ({c,i}));
  return curFilter === 'fav' ? all.filter(({c}) => c.fav) : all;
}

// ══════════════════════════════════════════
// LIST
// ══════════════════════════════════════════
function renderList() {
  const el   = document.getElementById('cList');
  const favs = cards.filter(c=>c.fav).length;
  document.getElementById('cCount').textContent =
    `${cards.length} card${cards.length!==1?'s':''}${favs?' · '+favs+' ⭐':''}`;

  const list = filteredList();
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">${curFilter==='fav'?'⭐':'📭'}</div>
      <p>${curFilter==='fav'?'No favorites yet.<br>Tap ☆ on any card.':'No cards yet.<br>Tap <strong>＋</strong> to start.'}</p></div>`;
    return;
  }
  el.innerHTML = list.map(({c,i}, listIdx) => `
    <div class="crow">
      <span class="crow-num">${listIdx+1}</span>
      <div class="mini-pair">
        <div class="mini-card front-card">
          <div class="mini-face-tag">Front</div>
          ${miniContent(c.front)}
        </div>
        <div class="mini-card back-card" id="mc-back-${i}" onclick="togglePeek(${i})">
          <div class="mini-face-tag b">Back</div>
          <div class="back-content">${miniContent(c.back)}</div>
          <div class="peek-ico">🙈</div>
        </div>
      </div>
      <div class="crow-acts">
        <button class="btn-fav" onclick="toggleFav(${i})">${c.fav?'⭐':'☆'}</button>
        <button class="btn btn-sm"  onclick="openEdit(${i},null)">✏️</button>
        <button class="btn-insert"  onclick="openEdit(null,${i+1})">+</button>
        <button class="btn btn-del" onclick="delCard(${i})">✕</button>
      </div>
    </div>`).join('');
}

function miniContent(face) {
  if (face.type === 'image') return `<img class="mini-img" src="${face.value}" alt="">`;
  return `<div class="mini-body">${esc(face.value.slice(0,60))}</div>`;
}

function togglePeek(i) {
  const mc = document.getElementById(`mc-back-${i}`);
  mc.classList.toggle('revealed');
}

async function toggleFav(i) {
  cards[i].fav = !cards[i].fav;
  rawCards[i].fav = cards[i].fav;
  await persistCards();
  renderList();
}

async function delCard(i) {
  if (!confirm('Delete this card?')) return;
  // delete image blobs
  const rc = rawCards[i];
  if (rc.front.blobKey) await dbDel('images', rc.front.blobKey);
  if (rc.back.blobKey)  await dbDel('images', rc.back.blobKey);
  // revoke object URLs
  if (cards[i].front.value && cards[i].front.type==='image') URL.revokeObjectURL(cards[i].front.value);
  if (cards[i].back.value  && cards[i].back.type==='image')  URL.revokeObjectURL(cards[i].back.value);
  cards.splice(i,1);
  rawCards.splice(i,1);
  await persistCards();
  renderList();
}

document.getElementById('btnAdd').onclick       = () => openEdit(null, null);
document.getElementById('btnAddBottom').onclick = () => openEdit(null, null);
document.getElementById('btnStudyAll').onclick  = () => { const idx=filteredList().map(({i})=>i); if(idx.length) startStudy(idx); };
document.getElementById('btnShuffle').onclick   = () => {
  const idx = filteredList().map(({i})=>i);
  if (!idx.length) return;
  for (let k=idx.length-1;k>0;k--) { const j=Math.floor(Math.random()*(k+1)); [idx[k],idx[j]]=[idx[j],idx[k]]; }
  startStudy(idx);
};

// ══════════════════════════════════════════
// EDIT
// ══════════════════════════════════════════
function openEdit(idx, at) {
  editId = idx; insertAt = at;
  document.getElementById('editTtl').textContent = idx === null ? 'New Card' : 'Edit Card';
  if (idx !== null) {
    const c = cards[idx];
    initFace('f', c.front.type, c.front.value, c.front.blobKey||'');
    initFace('b', c.back.type,  c.back.value,  c.back.blobKey||'');
  } else {
    initFace('f','text','','');
    initFace('b','text','','');
  }
  showPg('pgEdit');
}

function initFace(face, type, value, blobKey) {
  if (face==='f') { fType=type; fImgData=type==='image'?value:''; fBlobKey=blobKey; }
  else            { bType=type; bImgData=type==='image'?value:''; bBlobKey=blobKey; }
  document.getElementById(face+'ToggleText').classList.toggle('active', type==='text');
  document.getElementById(face+'ToggleImg').classList.toggle('active',  type==='image');
  renderFaceInput(face, type, value);
}

function setFaceType(face, type) {
  if (face==='f') { fType=type; if(type==='text'){fImgData=''; fBlobKey='';} }
  else            { bType=type; if(type==='text'){bImgData=''; bBlobKey='';} }
  document.getElementById(face+'ToggleText').classList.toggle('active', type==='text');
  document.getElementById(face+'ToggleImg').classList.toggle('active',  type==='image');
  const val = face==='f' ? (type==='image'?fImgData:'') : (type==='image'?bImgData:'');
  renderFaceInput(face, type, val);
}

function renderFaceInput(face, type, value) {
  const el = document.getElementById(face+'Input');
  if (type === 'text') {
    el.innerHTML = `<textarea class="face-textarea" id="${face}Text" placeholder="Enter text...">${esc(value)}</textarea>`;
  } else {
    el.innerHTML = `<div class="img-area">
      <input type="file" accept="image/*" onchange="onImg(this,'${face}')">
      ${value
        ? `<img class="img-prev" src="${value}"><button class="img-rm" onclick="clearImg('${face}',event)">remove</button>`
        : `<span style="font-size:24px;">📷</span><div class="img-hint">tap to upload</div>`}
    </div>`;
  }
}

function onImg(input, face) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = e.target.result;
    if (face==='f') { fImgData=data; }
    else            { bImgData=data; }
    renderFaceInput(face, 'image', data);
  };
  reader.readAsDataURL(file);
}

function clearImg(face, e) {
  e.stopPropagation();
  if (face==='f') { fImgData=''; fBlobKey=''; }
  else            { bImgData=''; bBlobKey=''; }
  renderFaceInput(face, 'image', '');
}

function getFaceEditData(face) {
  const type = face==='f' ? fType : bType;
  if (type === 'text') {
    return { type:'text', value: document.getElementById(face+'Text')?.value || '' };
  }
  // image
  const imgData  = face==='f' ? fImgData  : bImgData;
  const blobKey  = face==='f' ? fBlobKey  : bBlobKey;
  return { type:'image', value: imgData, existingBlobKey: blobKey };
}

document.getElementById('saveCard').onclick = async () => {
  const frontEdit = getFaceEditData('f');
  const backEdit  = getFaceEditData('b');
  if (!frontEdit.value && !backEdit.value) return alert('Add some content!');

  // Build raw face descriptors (for DB) and runtime faces (object URLs)
  const frontRaw  = await persistFace(frontEdit, editId!==null ? rawCards[editId]?.front : null);
  const backRaw   = await persistFace(backEdit,  editId!==null ? rawCards[editId]?.back  : null);
  const frontRuntime = await resolveFace(frontRaw);
  const backRuntime  = await resolveFace(backRaw);

  const fav = editId !== null ? (cards[editId].fav || false) : false;
  const newCard    = { front: frontRuntime, back: backRuntime, fav };
  const newRawCard = { front: frontRaw,     back: backRaw,     fav };

  if (editId === null) {
    const at = insertAt !== null ? insertAt : cards.length;
    cards.splice(at, 0, newCard);
    rawCards.splice(at, 0, newRawCard);
    insertAt = null;
  } else {
    // revoke old object URLs if replaced
    if (cards[editId].front.type==='image' && cards[editId].front.value !== frontRuntime.value)
      URL.revokeObjectURL(cards[editId].front.value);
    if (cards[editId].back.type==='image' && cards[editId].back.value !== backRuntime.value)
      URL.revokeObjectURL(cards[editId].back.value);
    cards[editId]    = newCard;
    rawCards[editId] = newRawCard;
  }

  await persistCards();
  showPg('pgList');
  renderList();
};

// Persist a face and return its raw DB descriptor
async function persistFace(editFace, oldRaw) {
  if (editFace.type === 'text') {
    // if old face was image, clean up old blob
    if (oldRaw && oldRaw.type==='image' && oldRaw.blobKey)
      await dbDel('images', oldRaw.blobKey);
    return { type:'text', value: editFace.value };
  }
  // image
  if (editFace.value && editFace.value.startsWith('data:')) {
    // new image uploaded — save as new blob
    const newKey = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    await dbPut('images', { key: newKey, blob: dataURLtoBlob(editFace.value) });
    // delete old blob if different
    if (oldRaw && oldRaw.type==='image' && oldRaw.blobKey && oldRaw.blobKey !== newKey)
      await dbDel('images', oldRaw.blobKey);
    return { type:'image', blobKey: newKey };
  }
  // no change — keep existing blobKey
  if (editFace.existingBlobKey) return { type:'image', blobKey: editFace.existingBlobKey };
  return { type:'image', blobKey: '' };
}

function dataURLtoBlob(dataURL) {
  const [h,d] = dataURL.split(',');
  const mime  = h.match(/:(.*?);/)[1];
  const bin   = atob(d);
  const arr   = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// ══════════════════════════════════════════
// STUDY  (fully dynamic — no stale DOM)
// ══════════════════════════════════════════
function startStudy(idxArr) {
  deck = idxArr; di = 0;
  showPg('pgStudy');
  document.getElementById('studyInner').innerHTML = `
    <div class="study-hdr">
      <button id="studyBack" class="btn btn-back">←</button>
      <div class="prog-wrap">
        <div class="prog-txt" id="progTxt"></div>
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="result" id="result">
      <div style="font-size:40px;">✨</div>
      <h2>Done!</h2>
      <p id="resultSub"></p>
      <div class="result-acts">
        <button class="btn-save"   id="restartBtn">↺ Again</button>
        <button class="btn-cancel" id="toList">↩ List</button>
      </div>
    </div>
    <div id="studyWrap">
      <div class="flip-hint">tap to flip</div>
      <div class="flip-scene" id="flipScene">
        <div class="flip-card" id="flipCard">
          <div class="flip-face">
            <div class="ftag">Front</div>
            <button class="study-fav-btn" id="studyFavBtn">☆</button>
            <div id="sFront"></div>
          </div>
          <div class="flip-face flip-back">
            <div class="ftag b">Back</div>
            <div id="sBack"></div>
          </div>
        </div>
      </div>
      <div class="study-nav">
        <button class="snav-btn prev" id="prevBtn">←</button>
        <button class="snav-btn next" id="nextBtn">→</button>
      </div>
    </div>`;

  document.getElementById('studyBack').onclick  = () => { showPg('pgList'); renderList(); };
  document.getElementById('toList').onclick     = () => { showPg('pgList'); renderList(); };
  document.getElementById('restartBtn').onclick = () => {
    di = 0;
    document.getElementById('result').classList.remove('show');
    document.getElementById('studyWrap').style.display = '';
    renderCard();
  };
  document.getElementById('flipScene').onclick  = () => document.getElementById('flipCard').classList.toggle('flipped');
  document.getElementById('studyFavBtn').onclick = async e => {
    e.stopPropagation();
    cards[deck[di]].fav = !cards[deck[di]].fav;
    rawCards[deck[di]].fav = cards[deck[di]].fav;
    await persistCards();
    document.getElementById('studyFavBtn').textContent = cards[deck[di]].fav ? '⭐' : '☆';
  };
  document.getElementById('prevBtn').onclick = () => { if(di>0){ di--; renderCard(); } };
  document.getElementById('nextBtn').onclick = () => { di++; di>=deck.length ? showResult() : renderCard(); };

  renderCard();
}

function renderCard() {
  const c = cards[deck[di]];
  document.getElementById('progTxt').textContent  = `${di+1} / ${deck.length}`;
  document.getElementById('progFill').style.width = `${((di+1)/deck.length)*100}%`;
  document.getElementById('flipCard').classList.remove('flipped');
  document.getElementById('sFront').innerHTML = renderFace(c.front);
  document.getElementById('sBack').innerHTML  = renderFace(c.back);
  document.getElementById('studyFavBtn').textContent = c.fav ? '⭐' : '☆';
  document.getElementById('prevBtn').disabled = di === 0;
  document.getElementById('nextBtn').textContent = di < deck.length-1 ? '→' : '✓';
}

const renderFace = face => face.type === 'image'
  ? `<img class="face-img" src="${face.value}" alt="">`
  : `<div class="face-text">${esc(face.value)}</div>`;

function showResult() {
  document.getElementById('studyWrap').style.display = 'none';
  document.getElementById('result').classList.add('show');
  document.getElementById('resultSub').textContent = `${deck.length} cards reviewed`;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
openDB().then(async d => {
  db = d;
  await loadAllCards();
  renderList();
}).catch(err => {
  console.error('DB open failed', err);
  alert('Storage init failed. Please try reloading.');
});
</script>
